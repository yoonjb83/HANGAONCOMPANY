<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>한가온컴퍼니 입체 진단 시스템 (v2.3.0)</title>
    <!-- [비주얼 리소스] -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00D179;
            --bg: #FAFBFC;
            --text: #1E293B;
            --gray: #64748B;
            --radius: 25px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
        }

        .p-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.04);
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: 0.5s ease;
        }

        header {
            padding: 25px 20px 10px;
            text-align: center;
            font-weight: 950;
            color: var(--primary);
            font-size: 1.1rem;
        }

        /* 콘텐츠 영역 */
        .content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 200px;
        }

        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 2.1rem;
            font-weight: 950;
            line-height: 1.25;
            margin-bottom: 20px;
            letter-spacing: -1.2px;
        }

        .desc {
            font-size: 1rem;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* 입력 UI */
        .f-box {
            margin-bottom: 12px;
        }

        .f-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 6px;
            padding-left: 5px;
        }

        .f-input {
            width: 100%;
            height: 75px;
            border: 4px solid #F1F5F9;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 1.3rem;
            font-weight: 950;
            outline: none;
            background: white;
            transition: 0.2s;
        }

        .f-input:focus {
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 209, 121, 0.08);
        }

        .domain-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 30px;
        }

        .domain-btn {
            padding: 10px 15px;
            border-radius: 12px;
            border: 2px solid #F1F5F9;
            background: white;
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--gray);
            cursor: pointer;
        }

        .f-check {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 22px;
            background: #FFF;
            border-radius: 22px;
            border: 4px solid #F1F5F9;
            cursor: pointer;
            transition: 0.25s;
        }

        .f-check.checked {
            border-color: var(--primary);
            background: rgba(0, 209, 121, 0.04);
        }

        .f-check i {
            font-size: 2.2rem;
        }

        /* 카드 UI */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .card {
            background: #FFF;
            border-radius: 20px;
            padding: 20px;
            border: 4px solid transparent;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 80px;
        }

        .card.selected {
            border-color: var(--primary);
            background: rgba(0, 209, 121, 0.04);
        }

        .card-txt h3 {
            font-size: 1.25rem;
            font-weight: 950;
        }

        /* 하단 내비게이션 */
        .footer {
            position: fixed;
            bottom: 0;
            max-width: 600px;
            width: 100%;
            padding: 15px 15px 35px;
            background: linear-gradient(to top, #FAFBFC 85%, transparent);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-base {
            height: 82px;
            border-radius: 25px;
            border: none;
            font-size: 1.4rem;
            font-weight: 950;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            transition: 0.25s;
        }

        #ctaBtn {
            background: #E2E8F0;
            color: #94A3B8;
            cursor: not-allowed;
        }

        #ctaBtn.ready {
            background: var(--primary);
            color: #FFF;
            box-shadow: 0 15px 35px rgba(0, 209, 121, 0.3);
        }

        #backBtn {
            flex: 3;
            background: #FFF;
            border: 3px solid #F1F5F9;
            color: #64748B;
            display: none;
        }

        #retryBtn {
            background: #F1F5F9;
            color: #64748B;
            font-weight: 950;
            margin-top: 30px;
            border: 1px solid #E2E8F0;
        }

        /* 결과 화면 */
        .res-container {
            background: white;
            border-radius: 40px;
            padding: 50px 20px;
            text-align: center;
            border: 1px solid #F1F5F9;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.08);
        }

        .res-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(0, 209, 121, 0.1);
            color: var(--primary);
            border-radius: 10px;
            font-weight: 950;
            margin-bottom: 25px;
        }

        .res-img {
            width: 100%;
            border-radius: 35px;
            margin: 25px 0;
            border: 6px solid #F8FAFC;
        }

        .v-stamp {
            position: fixed;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #EEE;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="p-bar">
            <div id="progressBar"></div>
        </div>
        <header>HANGAON COMPANY</header>

        <div class="content">
            <!-- 1. 정보 입력 -->
            <div id="stepInfo" class="page active">
                <h2>반가워요 원장님!<br>입체 진단을 시작합니다.</h2>
                <p class="desc">정밀한 분석을 위해 기초 정보를 입력해주세요.</p>
                <div class="f-box"><span class="f-label">성함</span><input type="text" id="inName" class="f-input"
                        placeholder="원장님 성함" oninput="uiUpdate()" onkeydown="handleEnter(event, 'inPhone')"></div>
                <div class="f-box"><span class="f-label">연락처</span><input type="tel" id="inPhone" class="f-input"
                        value="010-" oninput="formatPhone(this)" onkeydown="handleEnter(event, 'inEmail')"></div>
                <div class="f-box"><span class="f-label">이메일</span><input type="email" id="inEmail" class="f-input"
                        placeholder="example@email.com" oninput="uiUpdate()" onkeydown="handleEnter(event, 'agreeBox')">
                </div>
                <div class="domain-row">
                    <button class="domain-btn" onclick="setDomain('@naver.com')">@naver.com</button>
                    <button class="domain-btn" onclick="setDomain('@gmail.com')">@gmail.com</button>
                    <button class="domain-btn" onclick="setDomain('@hanmail.net')">@hanmail.net</button>
                </div>
                <div class="f-check" id="agreeBox" onclick="toggleAgree()">
                    <i id="agreeIcon" class="fas fa-check-circle" style="color:#DDD;"></i>
                    <span style="font-weight:950; font-size:1.1rem;">개인정보 수집 및 상담 동의 (필수)</span>
                    <input type="checkbox" id="agree1" style="display:none">
                </div>
            </div>

            <!-- 2. 부문 선택 -->
            <div id="stepBranch" class="page">
                <h2>경영 상태에 따라<br>분기가 시작됩니다.</h2>
                <div class="card-list">
                    <div class="card" onclick="selectRoute('routeA')"><i class="fas fa-rocket"
                            style="color:var(--primary); font-size:1.8rem;"></i>
                        <div class="card-txt">
                            <h3>신규 개원 예정자</h3>
                        </div>
                    </div>
                    <div class="card" onclick="selectRoute('routeB')"><i class="fas fa-chart-line"
                            style="color:var(--primary); font-size:1.8rem;"></i>
                        <div class="card-txt">
                            <h3>기개원 운영 원장님</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. 상세 수치 (Route B 전 전용) -->
            <div id="stepStats" class="page">
                <h2>월 평균 매출 현황을<br>선택해 주세요.</h2>
                <p class="desc">현재 매출 구간에 따른 병목 구간을 진단합니다.</p>
                <div id="salesArea" class="card-list"></div>
                <div class="f-box" style="margin-top:20px;"><span class="f-label">일 평균 내원객 수 (명)</span><input
                        type="number" id="inPatients" class="f-input" placeholder="예: 40" oninput="uiUpdate()"
                        inputmode="numeric"></div>
            </div>

            <!-- 4. 정밀 문항 -->
            <div id="stepQuestion" class="page">
                <div id="qLabel"
                    style="background:var(--primary); color:#FFF; padding:6px 15px; border-radius:10px; display:inline-block; font-weight:950; font-size:0.85rem; margin-bottom:15px;">
                    영역</div>
                <h2 id="txtQ">질문 제목</h2>
                <div id="optArea" class="card-list"></div>
            </div>

            <!-- 5. 진단 결과 -->
            <div id="stepResult" class="page">
                <div id="resBox" class="res-container">준비 중...</div>
                <button id="retryBtn" class="btn-base" onclick="location.reload()">처음부터 다시 하기</button>
            </div>
        </div>

        <div class="footer">
            <button id="backBtn" class="btn-base" onclick="goBack()">이전</button>
            <button id="ctaBtn" class="btn-base" onclick="handleNext()">시작하기</button>
        </div>
        <div class="v-stamp">FINAL BUILD v2.3.0</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const state = {
            page: 'stepInfo', route: null, step: 0, data: {}, user: { name: '', phone: '', email: '', sales: '', patients: '' },
            salesRanges: ['1000만원 이하', '1000만~3000만', '3000만~5000만', '5000만~7000만', '7000만~1억', '1억~1.5억', '1.5억~2억', '2억~3억', '3억~5억', '5억 이상'],
            qA: [
                { c: '규모/기반', q: '지향하시는 병원 규모는?', o: ['적정 규모 실속형', '시스템 기반 중대형'], k: 'A1' },
                { c: '운영/전략', q: '진료 수익의 주된 비중은?', o: ['보험 진료 위주', '비급여(미용/특화) 중심'], k: 'A7' },
                { c: '비전/성장', q: '본원 이후 지점 확장 계획은?', o: ['단독 의원 집중', 'MSO/네트워크화'], k: 'A9' }
            ],
            qB: [
                { c: 'CS/상담', q: '상담 동의율이 안정적입니까?', k: 'B2' },
                { c: '마케팅', q: '광고 매체별 유입 분석이 됩니까?', k: 'B4' },
                { c: 'HR/관리', q: '명확한 인사/보상 체계가 있습니까?', k: 'B9' }
            ]
        };

        const cbt = document.getElementById('ctaBtn');
        const bbt = document.getElementById('backBtn');

        function formatPhone(el) { let v = el.value.replace(/[^0-9]/g, ''); if (v.length > 3 && v.length <= 7) el.value = v.substring(0, 3) + '-' + v.substring(3); else if (v.length > 7) el.value = v.substring(0, 3) + '-' + v.substring(3, 7) + '-' + v.substring(7, 11); else el.value = v; uiUpdate(); }
        function handleEnter(e, nextId) { if (e.key === 'Enter') { e.preventDefault(); if (nextId === 'agreeBox') toggleAgree(); else document.getElementById(nextId).focus(); } }
        function setDomain(d) { document.getElementById('inEmail').value = document.getElementById('inEmail').value.split('@')[0] + d; uiUpdate(); }

        function toggleAgree() {
            const chk = document.getElementById('agree1');
            const box = document.getElementById('agreeBox');
            chk.checked = !chk.checked;
            if (chk.checked) { box.classList.add('checked'); document.getElementById('agreeIcon').style.color = "#00D179"; }
            else { box.classList.remove('checked'); document.getElementById('agreeIcon').style.color = "#DDD"; }
            uiUpdate();
        }

        function uiUpdate() {
            const n = document.getElementById('inName').value.trim();
            const p = document.getElementById('inPhone').value.trim();
            const e = document.getElementById('inEmail').value.trim();
            const a = document.getElementById('agree1').checked;

            let ready = false;
            let ctaText = '다음';

            if (state.page === 'stepInfo') { ready = (n.length >= 2 && p.length >= 12 && e.includes('.') && a); ctaText = '시작하기'; }
            else if (state.page === 'stepStats') { ready = (state.user.sales !== '' && document.getElementById('inPatients').value > 0); ctaText = '진단 시작하기'; }
            else if (state.page === 'stepResult') { ready = true; ctaText = '종료 및 상담 예약'; }
            else { ready = true; ctaText = '다음'; }

            if (ready) cbt.classList.add('ready'); else cbt.classList.remove('ready');
            cbt.innerText = ctaText;
            bbt.style.display = (state.page === 'stepInfo') ? 'none' : 'flex';
            document.getElementById('progressBar').style.width = (state.page === 'stepResult' ? 100 : 20) + '%';
        }

        function selectRoute(r) { state.route = r; handleNext(); }

        function handleNext() {
            if (!cbt.classList.contains('ready')) return;
            if (state.page === 'stepInfo') { state.page = 'stepBranch'; render(); }
            else if (state.page === 'stepBranch') { if (state.route === 'routeB') { state.page = 'stepStats'; renderSales(); } else state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepStats') { state.user.patients = document.getElementById('inPatients').value; state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepQuestion') {
                const list = state.route === 'routeA' ? state.qA : state.qB;
                if (state.step < list.length - 1) { state.step++; render(); }
                else { state.page = 'stepResult'; render(); saveLead(); }
            }
        }

        function renderSales() {
            const sa = document.getElementById('salesArea'); sa.innerHTML = '';
            state.salesRanges.forEach(r => {
                const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${r}</h3>`;
                if (state.user.sales === r) d.classList.add('selected');
                d.onclick = () => { state.user.sales = r; renderSales(); uiUpdate(); };
                sa.appendChild(d);
            });
            render();
        }

        function goBack() {
            if (state.page === 'stepQuestion') { if (state.step > 0) state.step--; else state.page = (state.route === 'routeB') ? 'stepStats' : 'stepBranch'; }
            else if (state.page === 'stepStats') state.page = 'stepBranch';
            else if (state.page !== 'stepInfo') state.page = 'stepInfo';
            render();
        }

        function render() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(state.page).classList.add('active');
            if (state.page === 'stepQuestion') {
                const list = state.route === 'routeA' ? state.qA : state.qB;
                const cq = list[state.step];
                document.getElementById('qLabel').innerText = cq.c;
                document.getElementById('txtQ').innerText = cq.q;
                const oA = document.getElementById('optArea'); oA.innerHTML = '';
                if (state.route === 'routeA') {
                    cq.o.forEach((o, i) => {
                        const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${o}</h3>`;
                        d.onclick = () => { state.data[cq.k] = i; handleNext(); }; oA.appendChild(d);
                    });
                } else {
                    [{ v: 5, t: '우수' }, { v: 3, t: '관찰필요' }, { v: 1, t: '미흡/개선' }].forEach(s => {
                        const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${s.t}</h3>`;
                        d.onclick = () => { state.data[cq.k] = s.v; handleNext(); }; oA.appendChild(d);
                    });
                }
            } else if (state.page === 'stepResult') {
                document.getElementById('resBox').innerHTML = `<span class="res-badge">진단완료</span><h2>분석 리포트가 생성되었습니다.</h2><img src="hospital_persona_medical_center_1773995174948.png" class="res-img"><p class="desc">한가온컴퍼니 전문가가 분석 결과를 토대로 보완 전략을 곧 제안해 드리겠습니다.</p>`;
            }
            uiUpdate(); if (document.querySelector('.content')) document.querySelector('.content').scrollTop = 0;
        }

        async function saveLead() {
            const payload = { data: [{ time: new Date().toLocaleString(), name: document.getElementById('inName').value, phone: document.getElementById('inPhone').value, email: document.getElementById('inEmail').value, route: state.route, answers: JSON.stringify(state.data), sales: state.user.sales }] };
            fetch('https://sheetdb.io/api/v1/3reeb3ra3fklt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }
        uiUpdate();
    </script>
</body>

</html>
