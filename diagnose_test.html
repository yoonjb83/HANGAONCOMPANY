<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>한가온컴퍼니 정밀 진단 리포트 (v2.4.0)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00D179;
            --bg: #FAFBFC;
            --text: #1E293B;
            --gray: #64748B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
        }

        .p-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.04);
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: 0.5s ease;
        }

        header {
            padding: 25px 20px 10px;
            text-align: center;
            font-weight: 950;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 200px;
        }

        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 2.1rem;
            font-weight: 950;
            line-height: 1.25;
            margin-bottom: 20px;
            letter-spacing: -1.2px;
        }

        .desc {
            font-size: 1rem;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .f-box {
            margin-bottom: 15px;
        }

        .f-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 950;
            color: var(--primary);
            margin-bottom: 6px;
            padding-left: 5px;
        }

        .f-input {
            width: 100%;
            height: 75px;
            border: 4px solid #F1F5F9;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 1.3rem;
            font-weight: 950;
            outline: none;
            background: white;
            transition: 0.2s;
        }

        .f-input:focus {
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0, 209, 121, 0.08);
        }

        .f-check {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 22px;
            background: #FFF;
            border-radius: 22px;
            border: 4px solid #F1F5F9;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 10px;
        }

        .f-check.checked {
            border-color: var(--primary);
            background: rgba(0, 209, 121, 0.04);
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .card {
            background: #FFF;
            border-radius: 22px;
            padding: 25px 20px;
            border: 4px solid transparent;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 18px;
            min-height: 90px;
        }

        .card.selected {
            border-color: var(--primary);
            background: rgba(0, 209, 121, 0.05);
        }

        .res-section {
            background: white;
            border-radius: 35px;
            padding: 35px 20px;
            margin-bottom: 20px;
            border: 1px solid #F1F5F9;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
            text-align: left;
        }

        .res-h3 {
            font-size: 1.3rem;
            font-weight: 950;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #F8FAFC;
            border-radius: 20px;
            padding: 22px;
            margin-top: 15px;
            border-left: 5px solid var(--primary);
        }

        .tip-box h4 {
            font-size: 1rem;
            font-weight: 950;
            margin-bottom: 6px;
        }

        .res-img {
            width: 100%;
            border-radius: 30px;
            margin: 20px 0;
            border: 8px solid #F8FAFC;
        }

        .footer {
            position: fixed;
            bottom: 0;
            max-width: 600px;
            width: 100%;
            padding: 15px 15px 35px;
            background: linear-gradient(to top, #FAFBFC 85%, transparent);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-base {
            height: 80px;
            border-radius: 25px;
            border: none;
            font-size: 1.4rem;
            font-weight: 950;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            transition: 0.25s;
        }

        #ctaBtn {
            background: #E2E8F0;
            color: #94A3B8;
            cursor: not-allowed;
        }

        #ctaBtn.ready {
            background: var(--primary);
            color: #FFF;
            box-shadow: 0 15px 35px rgba(0, 209, 121, 0.3);
        }

        #backBtn {
            flex: 3;
            background: #FFF;
            border: 3px solid #F1F5F9;
            color: #64748B;
            display: none;
        }

        #retryBtn {
            background: #F1F5F9;
            color: #64748B;
            margin-top: 30px;
            width: 100%;
        }

        .v-stamp {
            position: fixed;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #EEE;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="p-bar">
            <div id="progressBar"></div>
        </div>
        <header>HANGAON COMPANY</header>
        <div class="content">
            <div id="stepInfo" class="page active">
                <h2>반가워요 원장님!<br>입체 진단을 시작합니다.</h2>
                <div class="f-box"><span class="f-label">성함</span><input type="text" id="inName" class="f-input"
                        oninput="uiUpdate()" onkeydown="handleEnter(event, 'inPhone')"></div>
                <div class="f-box"><span class="f-label">연락처</span><input type="tel" id="inPhone" class="f-input"
                        value="010-" oninput="formatPhone(this)" onkeydown="handleEnter(event, 'inEmail')"></div>
                <div class="f-box"><span class="f-label">이메일</span><input type="email" id="inEmail" class="f-input"
                        oninput="uiUpdate()" onkeydown="handleEnter(event, 'agreeBox')"></div>
                <div class="f-check" id="agreeBox" onclick="toggleAgree()">
                    <i id="agreeIcon" class="fas fa-check-circle" style="color:#DDD; font-size:2rem;"></i><span
                        style="font-weight:950; font-size:1.1rem;">개인정보 수집 및 상담 동의 (필수)</span>
                    <input type="checkbox" id="agree1" style="display:none">
                </div>
            </div>
            <div id="stepBranch" class="page">
                <h2>경영 상태에 맞춰<br>분기가 시작됩니다.</h2>
                <div class="card-list">
                    <div class="card" onclick="selectRoute('routeA')"><i class="fas fa-rocket"
                            style="color:var(--primary); font-size:2rem;"></i>
                        <div class="card-txt">
                            <h3>신규 개원 예정자</h3>
                        </div>
                    </div>
                    <div class="card" onclick="selectRoute('routeB')"><i class="fas fa-chart-line"
                            style="color:var(--primary); font-size:2rem;"></i>
                        <div class="card-txt">
                            <h3>개원 운영 원장님</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div id="stepStats" class="page">
                <h2>월 평균 매출 수치를<br>선택해 주세요.</h2>
                <div id="salesArea" class="card-list"></div>
                <div class="f-box" style="margin-top:20px;"><span class="f-label">일 평균 내원객 수</span><input type="number"
                        id="inPatients" class="f-input" inputmode="numeric" oninput="uiUpdate()"></div>
            </div>
            <div id="stepQuestion" class="page">
                <h2 id="txtQ">질문</h2>
                <div id="optArea" class="card-list"></div>
            </div>
            <div id="stepResult" class="page">
                <div id="resBox"></div><button id="retryBtn" class="btn-base" onclick="location.reload()">다시하기</button>
            </div>
        </div>
        <div class="footer"><button id="backBtn" class="btn-base" onclick="goBack()">이전</button><button id="ctaBtn"
                class="btn-base" onclick="handleNext()">진단시작하기</button></div>
        <div class="v-stamp">EXPERT MASTER v2.4.0</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const state = {
            page: 'stepInfo', route: null, step: 0, data: {}, user: { name: '', phone: '', email: '', sales: '' },
            salesRanges: ['1000만원 이하', '1000만~5억', '5억 이상'],
            qA: [
                { c: '규모', q: '지향하시는 병원 규모는?', o: ['실속형(1인)', '시스템 대형'], k: 'A1' }, { c: '시설', q: '입원실 운영 계획은?', o: ['외래중심', '입원포함'], k: 'A2' }, { c: '자본', q: '초기 자본 투입 성향은?', o: ['절약형', '공격형'], k: 'A3' },
                { c: '입지', q: '선호 상권 형태는?', o: ['거주 주거지', '도심 역세권'], k: 'A4' }, { c: '타겟', q: '주요 환자층은?', o: ['가족/노년', '직장인/MZ'], k: 'A5' }, { c: '마케팅', q: '주요 홍보 채널은?', o: ['오프라인', '온라인/SNS'], k: 'A6' },
                { c: '수익', q: '진료 비중?', o: ['보험중심', '비급여특화'], k: 'A7' }, { c: '스타일', q: '진료 스타일?', o: ['원장술기', '장비기반'], k: 'A8' }, { c: '브랜드', q: '브랜드 운영?', o: ['개인브랜드', 'MSO네트워크'], k: 'A9' }
            ],
            qB: [
                { c: 'CS', q: '응대 매뉴얼이 있나요?', k: 'B1' }, { c: 'CS', q: '상담 결정율이 높은가요?', k: 'B2' }, { c: 'CS', q: '응대 품질이 좋은가요?', k: 'B3' },
                { c: '마케팅', q: '유입 분석을 하나요?', k: 'B4' }, { c: '마케팅', q: '노출 순위가 높은가요?', k: 'B5' }, { c: '마케팅', q: '비용 비중이 적절한가요?', k: 'B6' },
                { c: 'HR', q: '이직률이 낮은가요?', k: 'B7' }, { c: 'HR', q: '내부 교육을 하나요?', k: 'B8' }, { c: 'HR', q: '성과 보상이 있나요?', k: 'B9' },
                { c: '수익', q: '환자 객단가가 목표치인가요?', k: 'B10' }, { c: '수익', q: '청구 누락 방지가 되나요?', k: 'B11' }, { c: '수익', q: '대기 관리가 되나요?', k: 'B12' },
                { c: 'CRM', q: '재진 관리가 되나요?', k: 'B13' }, { c: 'CRM', q: '팔로업이 시행되나요?', k: 'B14' }, { c: 'CRM', q: 'VIP 관리가 있나요?', k: 'B15' },
                { c: '비전', q: '로드맵이 명확한가요?', k: 'B16' }, { c: '비전', q: '시스템 경영 고려하나요?', k: 'B17' }, { c: '비전', q: '재무 관리가 되나요?', k: 'B18' }
            ]
        };
        const cbt = document.getElementById('ctaBtn'), bbt = document.getElementById('backBtn');
        function formatPhone(el) { let v = el.value.replace(/[^0-9]/g, ''); el.value = v.substring(0, 3) + '-' + v.substring(3, 7) + '-' + v.substring(7, 11); uiUpdate(); }
        function toggleAgree() { const chk = document.getElementById('agree1'); chk.checked = !chk.checked; document.getElementById('agreeIcon').style.color = chk.checked ? "#00D179" : "#DDD"; uiUpdate(); }
        function handleEnter(e, id) { if (e.key === 'Enter') { e.preventDefault(); if (id === 'agreeBox') toggleAgree(); else document.getElementById(id).focus(); } }
        function uiUpdate() {
            const n = document.getElementById('inName').value, p = document.getElementById('inPhone').value, a = document.getElementById('agree1').checked;
            let r = false; if (state.page === 'stepInfo') { r = (n.length >= 2 && p.length >= 12 && a); cbt.innerText = '진단시작하기'; } else if (state.page === 'stepStats') { r = (state.user.sales !== ''); cbt.innerText = '다음'; } else { r = true; cbt.innerText = '다음'; }
            if (r) cbt.classList.add('ready'); else cbt.classList.remove('ready');
            bbt.style.display = (state.page === 'stepInfo') ? 'none' : 'flex';
            document.getElementById('progressBar').style.width = (state.page === 'stepResult' ? 100 : 20) + '%';
        }
        function selectRoute(r) { state.route = r; handleNext(); }
        function handleNext() {
            if (!cbt.classList.contains('ready')) return;
            if (state.page === 'stepInfo') { state.page = 'stepBranch'; render(); }
            else if (state.page === 'stepBranch') { if (state.route === 'routeB') { state.page = 'stepStats'; renderSales(); } else state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepStats') { state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepQuestion') { const l = state.route === 'routeA' ? state.qA : state.qB; if (state.step < l.length - 1) { state.step++; render(); } else { state.page = 'stepResult'; render(); saveLead(); } }
        }
        function renderSales() { const sa = document.getElementById('salesArea'); sa.innerHTML = ''; state.salesRanges.forEach(r => { const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${r}</h3>`; if (state.user.sales === r) d.classList.add('selected'); d.onclick = () => { state.user.sales = r; renderSales(); uiUpdate(); }; sa.appendChild(d); }); render(); }
        function goBack() { if (state.page === 'stepQuestion' && state.step > 0) state.step--; else if (state.page === 'stepStats') state.page = 'stepBranch'; else if (state.page !== 'stepInfo') state.page = 'stepInfo'; render(); }
        function render() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(state.page).classList.add('active');
            if (state.page === 'stepQuestion') {
                const l = state.route === 'routeA' ? state.qA : state.qB, cq = l[state.step], oA = document.getElementById('optArea'); oA.innerHTML = '';
                document.getElementById('txtQ').innerText = cq.q;
                cq.o ? cq.o.forEach((o, i) => { const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${o}</h3>`; d.onclick = () => { state.data[cq.k] = i; handleNext(); }; oA.appendChild(d); }) : [5, 3, 1].forEach(v => { const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<h3>${v === 5 ? '우수' : '미흡'}</h3>`; d.onclick = () => { state.data[cq.k] = v; handleNext(); }; oA.appendChild(d); });
            } else if (state.page === 'stepResult') renderFinal();
            uiUpdate(); if (document.querySelector('.content')) document.querySelector('.content').scrollTop = 0;
        }
        function renderFinal() {
            const bx = document.getElementById('resBox'), d = state.data;
            if (state.route === 'routeA') {
                const sys = d.A1 >= 1, urb = d.A4 === 1, spc = d.A7 === 1;
                let rx = { t: '동네 주치의 명의형', i: 'hospital_persona_neighborhood_healer_1773995146325.png', s: '지역 커뮤니티 밀착 마케팅 전략 필수.', j: '회전율보다 재방문 주기 관리가 성공의 핵심입니다.' };
                if (sys && urb && spc) rx = { t: '도심형 하이엔드 마스터', i: 'hospital_persona_urban_high_end_1773995130218.png', s: '높은 임대료 상쇄를 위한 고단가 패키지 구성.', j: '프리미엄 공간 구성을 통한 권위 설정이 필수입니다.' };
                bx.innerHTML = `<div class="res-section"><span class="res-badge">진단 결과</span><h2>원장님은 [${rx.t}] 입니다.</h2><img src="${rx.i}" class="res-img"><div class="tip-box"><h4>전략</h4><p>${rx.s}</p></div><div class="tip-box"><h4>제언</h4><p>${rx.j}</p></div></div>`;
            } else {
                const dm = { CS: (d.B1 + d.B2 + d.B3) / 3, 마케팅: (d.B4 + d.B5 + d.B6) / 3, HR: (d.B7 + d.B8 + d.B9) / 3, CRM: (d.B13 + d.B14 + d.B15) / 3 };
                const s = Object.entries(dm).sort((a, b) => a[1] - b[1]), b1 = s[0][0], b2 = s[1][0];
                bx.innerHTML = `<div class="res-section"><span class="res-badge">경영 진단</span><h2>TOP 2 병목: [${b1} / ${b2}]</h2><canvas id="radarChart"></canvas><div class="tip-box"><h4>처방</h4><p>${b1}과 ${b2} 영역의 보완이 시급하며, 시스템 재구축을 권장합니다.</p></div></div>`;
                setTimeout(() => { new Chart(document.getElementById('radarChart'), { type: 'radar', data: { labels: Object.keys(dm), datasets: [{ data: Object.values(dm), borderColor: '#00D179', backgroundColor: 'rgba(0,209,121,0.1)' }] }, options: { scales: { r: { max: 5, min: 0 } } } }); }, 100);
            }
        }
        async function saveLead() { fetch('https://sheetdb.io/api/v1/3reeb3ra3fklt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data: [{ time: new Date().toLocaleString(), name: document.getElementById('inName').value, route: state.route, answers: JSON.stringify(state.data) }] }) }); }
        uiUpdate();
    </script>
</body>

</html>
