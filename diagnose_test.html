<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>한가온컴퍼니 정밀 진단 시스템 (v2.1.5)</title>
    <!-- [비주얼 리소스] -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+KR:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #00D179;
            --bg: #FAFBFC;
            --text: #1E293B;
            --gray: #64748B;
            --radius: 25px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* [반응형 레이아웃의 핵심: Flex 구조] */
        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
        }

        /* 진행도 */
        .p-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.05);
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: 0.5s ease;
        }

        header {
            padding: 25px 20px 10px;
            text-align: center;
            font-weight: 950;
            color: var(--primary);
            font-size: 1.1rem;
        }

        /* [콘텐츠 영역: 키보드 대응형 스크롤 활성화] */
        .content {
            flex: 1;
            padding: 20px 15px 120px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            display: none;
            width: 100%;
        }

        .page.active {
            display: block;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 1.95rem;
            font-weight: 950;
            line-height: 1.25;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .desc {
            font-size: 1.05rem;
            color: var(--gray);
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 카드 UI (가변 크기 적용) */
        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            background: #FFF;
            border-radius: var(--radius);
            padding: 22px 20px;
            border: 4px solid transparent;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card.selected {
            border-color: var(--primary);
            background: rgba(0, 209, 121, 0.04);
        }

        .card i {
            font-size: 2rem;
            color: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-txt h3 {
            font-size: 1.4rem;
            font-weight: 950;
        }

        /* 입력 폼 (키보드 대응형 여백) */
        .f-box {
            margin-bottom: 12px;
        }

        .f-input {
            width: 100%;
            height: 75px;
            border: 4px solid #F1F5F9;
            border-radius: 20px;
            padding: 0 20px;
            font-size: 1.3rem;
            font-weight: 900;
            outline: none;
            background: white;
            transition: 0.2s;
        }

        .f-input:focus {
            border-color: var(--primary);
            background: #FFF;
            box-shadow: 0 5px 15px rgba(0, 209, 121, 0.1);
        }

        .f-check {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px;
            background: #FFF;
            border-radius: 20px;
            border: 4px solid #F1F5F9;
            cursor: pointer;
            margin-top: 20px;
        }

        /* 하단 고정 지점 (키보드가 올라오면 가려질 수 있으나, 콘텐츠는 스크롤 가능) */
        .footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px 15px 35px;
            background: linear-gradient(to top, #FAFBFC 80%, transparent);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn-base {
            height: 78px;
            border-radius: var(--radius);
            border: none;
            font-size: 1.35rem;
            font-weight: 950;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            transition: 0.25s;
        }

        #ctaBtn {
            background: #E2E8F0;
            color: #94A3B8;
            cursor: not-allowed;
        }

        #ctaBtn.ready {
            background: var(--primary);
            color: #FFF;
            box-shadow: 0 12px 30px rgba(0, 209, 121, 0.3);
            cursor: pointer;
        }

        #backBtn {
            flex: 3;
            background: #FFF;
            border: 3px solid #F1F5F9;
            color: #64748B;
            display: none;
        }

        /* 결과 화면 */
        .res-container {
            background: #FFF;
            border-radius: 35px;
            padding: 45px 20px;
            text-align: center;
            border: 1px solid #F1F5F9;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .res-badge {
            display: inline-block;
            padding: 8px 18px;
            background: rgba(0, 209, 121, 0.1);
            color: var(--primary);
            border-radius: 10px;
            font-weight: 950;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .res-img {
            width: 100%;
            border-radius: 30px;
            margin: 20px 0;
            border: 6px solid #F8FAFC;
        }

        .v-stamp {
            position: absolute;
            bottom: 5px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #DDD;
            font-weight: 900;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="p-bar">
            <div id="progressBar"></div>
        </div>
        <header>HANGAON COMPANY</header>

        <div class="content">
            <!-- 1. 정보 입력 -->
            <div id="stepInfo" class="page active">
                <h2>반가워요 원장님!<br>정밀 진단을 시작합니다.</h2>
                <p class="desc">기본 정보 입력 후 커스터마이징된 분석 질문지가 제공됩니다.</p>
                <div class="f-box"><input type="text" id="inName" class="f-input" placeholder="성함" oninput="uiUpdate()">
                </div>
                <div class="f-box"><input type="tel" id="inPhone" class="f-input" placeholder="연락처 (010-0000-0000)"
                        oninput="formatPhone(this)" inputmode="numeric"></div>
                <div class="f-check" id="agreeBox" onclick="toggleAgree()">
                    <i id="agreeIcon" class="fas fa-check-circle" style="color:#DDD; font-size:2rem;"></i>
                    <span style="font-weight:950; font-size:1rem;">개인정보 수집 및 상담 동의 (필수)</span>
                    <input type="checkbox" id="agree1" style="display:none">
                </div>
            </div>

            <!-- 2. 부문 선택 -->
            <div id="stepBranch" class="page">
                <h2>진단 부문을<br>말씀해주세요.</h2>
                <div class="card-list">
                    <div class="card" onclick="selectRoute('routeA')"><i class="fas fa-rocket"></i>
                        <div class="card-txt">
                            <h3>신규 개원 예정</h3>
                        </div>
                    </div>
                    <div class="card" onclick="selectRoute('routeB')"><i class="fas fa-chart-line"></i>
                        <div class="card-txt">
                            <h3>이미 운영 중</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. 수치 입력 (Route B) -->
            <div id="stepStats" class="page">
                <h2>현재 경영<br>수치를 입력해주세요.</h2>
                <p class="desc">키보드 때문에 화면이 가릴 경우 위로 밀어보세요.</p>
                <div class="f-box"><input type="number" id="inSales" class="f-input" placeholder="매출액 (만원)"
                        oninput="uiUpdate()" inputmode="numeric"></div>
                <div class="f-box"><input type="number" id="inPatients" class="f-input" placeholder="내원객수 (명)"
                        oninput="uiUpdate()" inputmode="numeric"></div>
                <div class="f-box"><input type="number" id="inTarget" class="f-input" placeholder="희망매출 (만원)"
                        oninput="uiUpdate()" inputmode="numeric"></div>
            </div>

            <!-- 4. 진단 문항 -->
            <div id="stepQuestion" class="page">
                <div id="qLabel"
                    style="background:var(--primary); color:#FFF; padding:5px 12px; border-radius:10px; display:inline-block; font-weight:950; font-size:0.85rem; margin-bottom:12px;">
                    진행</div>
                <h2 id="txtQ">질문 제목</h2>
                <div id="optArea" class="card-list"></div>
            </div>

            <!-- 5. 결과 리포트 -->
            <div id="stepResult" class="page">
                <div id="resBox" class="res-container">준비 중...</div>
            </div>
        </div>

        <div class="footer">
            <button id="backBtn" class="btn-base" onclick="goBack()">이전</button>
            <button id="ctaBtn" class="btn-base" onclick="handleNext()">시작하기</button>
        </div>
        <div class="v-stamp">RESPONSIVE v2.1.5</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const state = {
            page: 'stepInfo', route: null, step: 0, data: {}, user: { name: '', phone: '', sales: '', patients: '', target: '' },
            qA: [
                { c: '규모/시설', q: '지향하시는 병원 규모는?', o: ['1인 위주 실속 모델', '전문화된 중대형 모델'], k: 'A1' },
                { c: '규모/시설', q: '입원실 운영 계획이 있습니까?', o: ['외래 중심(30평 내외)', '수술/입원 중심(100평 이상)'], k: 'A2' },
                { c: '입지/환경', q: '고려하시는 상권 형태는?', o: ['안정적 배후지(거주형)', '유동인규 밀집(도심형)'], k: 'A4' },
                { c: '입지/환경', q: '주 타겟 고객층은?', o: ['가족/노년층(패밀리)', '적극적인 MZ세대'], k: 'A5' },
                { c: '모델/전략', q: '진료 수익의 주된 원천은?', o: ['급여/보험 중심', '비급여/클리닉 중심'], k: 'A7' },
                { c: '모델/전략', q: '지점 확장 계획이 있습니까?', o: ['단독 의원 고도화', '네트워크/MSO 확장'], k: 'A9' }
            ],
            qB: [
                { c: 'CS', q: '직원 응대 매뉴얼이 있나요?', k: 'B1' }, { c: '마케팅', q: '광고 매체당 효율을 분석하나요?', k: 'B4' },
                { c: 'HR', q: '성과 보상 체계가 있습니까?', k: 'B9' }, { c: 'CRM', q: '재진 환자 예약 관리를 하나요?', k: 'B14' },
                { c: '비전', q: '3년 내 비전 로드맵이 있습니까?', k: 'B16' }, { c: '관리', q: '원가 분석을 시행합니까?', k: 'B18' }
            ]
        };

        const cbt = document.getElementById('ctaBtn');
        const bbt = document.getElementById('backBtn');

        function formatPhone(el) { let v = el.value.replace(/[^0-9]/g, ''); if (v.length > 3 && v.length <= 7) el.value = v.substring(0, 3) + '-' + v.substring(3); else if (v.length > 7) el.value = v.substring(0, 3) + '-' + v.substring(3, 7) + '-' + v.substring(7, 11); else el.value = v; uiUpdate(); }
        function toggleAgree() { const chk = document.getElementById('agree1'); chk.checked = !chk.checked; document.getElementById('agreeIcon').style.color = chk.checked ? "#00D179" : "#DDD"; uiUpdate(); }

        function uiUpdate() {
            let ready = false;
            const name = document.getElementById('inName').value.trim();
            const phone = document.getElementById('inPhone').value.trim();
            const agree = document.getElementById('agree1').checked;

            if (state.page === 'stepInfo') { ready = (name.length >= 2 && phone.length >= 11 && agree); bbt.style.display = 'none'; }
            else if (state.page === 'stepStats') { ready = (document.getElementById('inSales').value > 0); bbt.style.display = 'flex'; }
            else { ready = true; bbt.style.display = (state.page === 'stepBranch') ? 'none' : 'flex'; }

            if (ready) cbt.classList.add('ready'); else cbt.classList.remove('ready');
            let pct = (state.page === 'stepResult') ? 100 : (state.page === 'stepInfo' ? 10 : (state.page === 'stepBranch' ? 20 : (state.step * 10 + 30)));
            document.getElementById('progressBar').style.width = pct + '%';
        }

        function selectRoute(r) { state.route = r; handleNext(); }
        function handleNext() {
            if (!cbt.classList.contains('ready')) return;
            if (state.page === 'stepInfo') { state.page = 'stepBranch'; render(); }
            else if (state.page === 'stepBranch') { if (state.route === 'routeB') state.page = 'stepStats'; else state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepStats') { state.page = 'stepQuestion'; render(); }
            else if (state.page === 'stepQuestion') {
                const list = state.route === 'routeA' ? state.qA : state.qB;
                if (state.step < list.length - 1) { state.step++; render(); }
                else { state.page = 'stepResult'; render(); saveLead(); }
            }
        }
        function goBack() {
            if (state.page === 'stepQuestion') { if (state.step > 0) state.step--; else state.page = (state.route === 'routeB') ? 'stepStats' : 'stepBranch'; }
            else if (state.page === 'stepStats') { state.page = 'stepBranch'; }
            else if (state.page === 'stepBranch') { state.page = 'stepInfo'; }
            render();
        }

        function render() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(state.page).classList.add('active');
            if (state.page === 'stepQuestion') {
                const cq = (state.route === 'routeA' ? state.qA : state.qB)[state.step];
                document.getElementById('qLabel').innerText = cq.c;
                document.getElementById('txtQ').innerText = cq.q;
                const oA = document.getElementById('optArea'); oA.innerHTML = '';
                if (state.route === 'routeA') { cq.o.forEach((o, i) => { const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<div class="card-txt"><h3>${o}</h3></div>`; d.onclick = () => { state.data[cq.k] = i; handleNext(); }; oA.appendChild(d); }); }
                else {
                    [5, 3, 1].forEach(v => { const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<i class="fas fa-check"></i><div class="card-txt"><h3>${v === 5 ? '매우 상' : '보통': '미흡' }</h3 ></div > `; d.onclick=()=>{ state.data[cq.k]=v; handleNext(); }; oA.appendChild(d); }); }
            } else if(state.page==='stepResult') { renderFinal(); }
            uiUpdate(); document.querySelector('.content').scrollTop = 0;
        }

        function renderFinal() {
            const bx = document.getElementById('resBox');
            const name = document.getElementById('inName').value;
            bx.innerHTML = `< span class= "res-badge" > 진단 리포트 완료</span ><h2>${name} 원장님을 위한 리포트가 생성되었습니다.</h2><img src="hospital_persona_medical_center_1773995174948.png" class="res-img"><p class="desc">정밀 분석 데이터는 이메일과 문자로도 전송되었습니다. 한가온컴퍼니 전문가와 상담을 시작해 보세요.</p>`;
        }

        async function saveLead() {
            const payload = { data: [{ time: new Date().toLocaleString(), name: document.getElementById('inName').value, phone: document.getElementById('inPhone').value, route: state.route, answers: JSON.stringify(state.data) }] };
            fetch('https://sheetdb.io/api/v1/3reeb3ra3fklt', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }
        uiUpdate();
    </script>
</body>

</html>
